name: Design Token Sync

on:
  # Ejecución manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      source:
        description: 'Fuente de los tokens'
        required: true
        default: 'figma'
        type: choice
        options:
          - figma
          - local

  # Ejecución automática al cambiar archivos de tokens
  push:
    branches: [develop]
    paths:
      - 'design-system/tokens/**'

jobs:
  sync-tokens:
    name: Sync Design Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch tokens from Figma
        if: ${{ github.event.inputs.source == 'figma' || github.event_name == 'push' }}
        run: pnpm --filter @saas/design-system tokens:fetch
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_ID: ${{ secrets.FIGMA_FILE_ID }}

      - name: Validate token schema
        run: pnpm --filter @saas/design-system tokens:validate

      - name: Transform tokens with Style Dictionary
        run: pnpm --filter @saas/design-system tokens:build

      - name: Build UI package
        run: pnpm --filter @saas/ui build

      - name: Run visual regression tests
        run: pnpm --filter @saas/ui test:visual
        continue-on-error: true

      - name: Commit transformed tokens
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'design(tokens): sync tokens from Figma [skip ci]'
          file_pattern: |
            design-system/tokens/**
            packages/ui/src/tokens/**
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

  notify-frontend:
    name: Notify Frontend Team
    runs-on: ubuntu-latest
    needs: sync-tokens
    if: success()
    steps:
      - name: Create GitHub Issue for token update
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎨 Design Tokens actualizados — verificar impacto visual',
              body: `Los design tokens fueron sincronizados desde Figma en el commit ${context.sha}.\n\n**Acciones requeridas:**\n- [ ] Revisar cambios en \`packages/ui/src/tokens/\`\n- [ ] Verificar que no hay regresiones visuales\n- [ ] Actualizar Storybook si es necesario\n\n**Workflow**: [Ver ejecución](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['design-system', 'tokens']
            })
